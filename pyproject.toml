[project]
name = "aws-api-mcp-gateway"
version = "0.1.0"
description = "AWS API MCP Gateway - AgentCore Gateway with MCP Lambda targets"
requires-python = ">=3.12"

[dependency-groups]
dev = [
    "ruff>=0.8.0",
    "boto3>=1.35.0",
]

[tool.ruff]
target-version = "py312"
line-length = 119

# Exclude build artifacts and generated files
extend-exclude = [
    "terraform/modules/mcp-lambda/.build/*",
    "__pycache__",
    ".git",
    ".venv",
]

[tool.ruff.lint]
# Rule categories:
#   C - McCabe complexity
#   E - pycodestyle errors
#   F - Pyflakes
#   I - isort
#   W - pycodestyle warnings
#   B - flake8-bugbear
#   UP - pyupgrade (Python upgrade suggestions)
#   SIM - flake8-simplify
#   PERF - Perflint (performance)
#   RUF - Ruff-specific rules
select = [
    "C",
    "E",
    "F",
    "I",
    "W",
    "B",
    "UP",
    "SIM",
    "PERF",
    "RUF",
]

# Ignored rules:
#   C901 - function is too complex
#   E501 - line too long (handled by formatter)
#   E721 - type comparison (use isinstance)
#   E741 - ambiguous variable name
#   F821 - undefined name in type annotation
#   F823 - local variable referenced before assignment
ignore = [
    "C901",
    "E501",
    "E721",
    "E741",
    "F821",
    "F823",
]

[tool.ruff.lint.per-file-ignores]
# Allow unused imports in __init__.py (re-exports)
"__init__.py" = ["E402", "F401", "F403", "F405", "F811"]
# Lambda handlers may have unused event/context
"**/lambda_function.py" = ["ARG001"]
# Test scripts may need sys.path manipulation before imports
"scripts/test_*.py" = ["E402"]

[tool.ruff.lint.isort]
lines-after-imports = 2
known-first-party = ["src"]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
